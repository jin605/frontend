<!-- 문서의 유형 -->
<!DOCTYPE html>
<!-- html 문서의 시작과 끝을 표시 -->
<html lang="ko">
    <!-- html 문서의 각종 정보와 스크립트, 스타일 시트를 선언한다. -->
    <head>

        <!-- meta 태그는 웹 브라우저에게 웹 문서와 관련된 정보를 제공한다. -->
        <!-- 인코딩 방식 설정 -->
        <meta charset="UTF-8">
        <!-- 접속한 기기의 화면에 맞추어 확대 / 축소하는 설정 -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <!-- html 문서의 본문 내용을 포함 -->
    <body>
        

        
    </body>
</html>
