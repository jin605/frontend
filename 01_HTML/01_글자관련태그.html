<!-- 문서의 유형 -->
<!DOCTYPE html>
<!-- html 문서의 시작과 끝을 표시 -->
<html lang="ko">
    <!-- html 문서의 각종 정보와 스크립트, 스타일 시트를 선언한다. -->
    <head>

        <!-- meta 태그는 웹 브라우저에게 웹 문서와 관련된 정보를 제공한다. -->
        <!-- 인코딩 방식 설정 -->
        <meta charset="UTF-8">
        <!-- 접속한 기기의 화면에 맞추어 확대 / 축소하는 설정 -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- 문서의 제목을 나타내는 태그이다. -->
        <title>Document</title>
    </head>
    <!-- html 문서의 본문 내용을 포함 -->
    <body>
        <h2>글자 관련 태그</h2>
        <h6>가장 작은 글자가 시작함</h6>
        <p>첫 번쨰 단락&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;진짜로</p>
        <p>첫 번쨰 단락&nbsp;진짜로</p>
        <p>첫 번쨰 단락&nbsp;진짜로</p>
        <p>첫 번쨰 단락&nbsp;진짜로</p>
        

        <!-- pre 태그는 공백과 줄바꿈을 유지하여 표시한다. -->
        <pre>
            안녕하세요
            저는 홍길동 입니다.
            만나서      반갑습니다.
        </pre>

        <code>
            
        </code>       
        

        
    </body>
</html>
